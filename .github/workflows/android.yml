name: Android APK Build and Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Gradle Wrapper permissions
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Locate APK
      id: locate_apk
      run: |
        APK_PATH=$(find . -name "*.apk" -path "*/debug/*" | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "❌ APK NOT FOUND — listing all apk files:"
          find . -name "*.apk" || true
          exit 1
        fi
        echo "✅ Found APK at: $APK_PATH"
        echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: location-tracker-debug
        path: ${{ env.APK_PATH }}

    - name: Create GitHub Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "Location Tracker v1.0.${{ github.run_number }}"
        body: |
          ## 📍 Location Tracker APK
          Auto-built from commit ${{ github.sha }}
        draft: false
        prerelease: false
        files: ${{ env.APK_PATH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
